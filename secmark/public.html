<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOMEL - вторичный рынок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h1>📦 Вторичный рынок - Публичные товары</h1>
        <div id="stats" class="stats" style="text-align: center; margin: 10px 0;"></div>
        <div id="mainlist" class="mainlist">
            <div class="loading">Загрузка товаров...</div>
        </div>
    </div>
    
    <script>
        let currentProducts = {};
        let isLoading = false;
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }
        
        function linkifyText(text) {
            if (!text || text === 'None' || text === null) return 'Нет информации';
            
            let safeText = escapeHtml(String(text));
            const parts = [];
            let lastIndex = 0;
            const urlPattern = /(https?:\/\/[^\s<>\"]+)/gi;
            let match;
            
            while ((match = urlPattern.exec(safeText)) !== null) {
                if (match.index > lastIndex) {
                    parts.push(safeText.substring(lastIndex, match.index));
                }
                
                const url = match[0];
                let displayUrl = url;
                if (displayUrl.length > 40) {
                    displayUrl = displayUrl.substring(0, 37) + '...';
                }
                parts.push(`<a href="${url}" target="_blank" rel="noopener noreferrer" class="message-link" title="${escapeHtml(url)}">${escapeHtml(displayUrl)}</a>`);
                
                lastIndex = match.index + url.length;
            }
            
            if (lastIndex < safeText.length) {
                parts.push(safeText.substring(lastIndex));
            }
            
            if (parts.length === 0) {
                return safeText;
            }
            
            return parts.join('');
        }
        
        function formatPhoneNumbers(text) {
            if (!text) return text;
            const phonePattern = /(\+?\d[\d\s\-\(\)]{7,}\d)/g;
            return text.replace(phonePattern, (phone) => {
                const cleanPhone = phone.replace(/[\s\-\(\)]/g, '');
                return `<a href="tel:${cleanPhone}" class="phone-link" title="Нажать для звонка">${escapeHtml(phone)}</a>`;
            });
        }
        
        function getProductIcon(icon) {
            if (icon && icon !== 'None' && icon !== null && icon.trim() !== '') {
                return `<img src="${escapeHtml(icon)}" alt="иконка товара" style="width: 60px; height: 60px; border-radius: 10px;" onerror="this.src=''; this.style.display='none'; this.parentElement.innerHTML='📦';">`;
            }
            return '📦';
        }
        
        function formatPrice(price) {
            if (!price || price === 'None' || price === null) return 'Цена не указана';
            return `💰 ${escapeHtml(String(price))}`;
        }
        
        function formatDescription(description) {
            if (!description || description === 'None' || description === null) return 'Нет описания';
            let text = escapeHtml(String(description));
            if (text.length > 200) {
                text = text.substring(0, 200) + '...';
            }
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        
        function formatBackcom(backcom) {
            if (!backcom || backcom === 'None' || backcom === null) return 'Нет информации';
            let result = linkifyText(backcom);
            result = formatPhoneNumbers(result);
            result = result.replace(/\n/g, '<br>');
            return result;
        }
        
        function getProductTypeClass(type) {
            const types = {
                'product': '#4CAF50',
                'service': '#2196F3',
                'vacancy': '#FF9800'
            };
            return types[type] || '#757575';
        }
        
        function getProductTypeName(type) {
            const typeNames = {
                'product': '📦 Товар',
                'service': '🔧 Услуга',
                'vacancy': '💼 Вакансия'
            };
            return typeNames[type] || type || '📄 Общее';
        }
        
        function createProductCard(key, product) {
            const safeName = escapeHtml(product.name || 'Без названия');
            
            return `
                <div class="product-card" data-id="${escapeHtml(String(key))}">
                    <div class="product-icon">
                        ${getProductIcon(product.icon)}
                    </div>
                    <div class="name">
                        <strong>${safeName}</strong>
                    </div>
                    <div class="product-price">
                        ${formatPrice(product.price)}
                    </div>
                    <div class="product-description">
                        <p>${formatDescription(product.description)}</p>
                    </div>
                    ${product.special && product.special.tags && product.special.tags.length > 0 ? `
                        <div class="product-tags">
                            ${product.special.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="product-backcom">
                        <strong>📞 Связь:</strong><br>
                        ${formatBackcom(product.backcom)}
                    </div>
                    <div class="product-type" style="background: ${getProductTypeClass(product.type)}">
                        ${getProductTypeName(product.type)}
                    </div>
                </div>
            `;
        }
        
        function renderProducts(productsDict) {
            const container = document.getElementById('mainlist');
            const productCount = Object.keys(productsDict).length;
            
            if (!productsDict || productCount === 0) {
                container.innerHTML = `<div class="empty-state"><p>📭 Публичных товаров пока нет</p></div>`;
                const statsDiv = document.getElementById('stats');
                if (statsDiv) statsDiv.innerHTML = '📊 Нет товаров';
                return;
            }
            
            const productsHTML = `<div class="products-grid">${Object.entries(productsDict).map(([key, product]) => createProductCard(key, product)).join('')}</div>`;
            container.innerHTML = productsHTML;
            
            const statsDiv = document.getElementById('stats');
            if (statsDiv) statsDiv.innerHTML = `📊 Всего товаров: ${productCount}`;
        }
        
        function clearAllCache() {
            try {
                localStorage.removeItem('somel_products_cache');
                localStorage.removeItem('somel_timestamps');
                localStorage.removeItem('somel_cached_ids');
                console.log('All cache cleared');
            } catch (e) {
                console.error('Clear cache error:', e);
            }
        }
        
        function saveToCache(products, idsWithTimestamps) {
            try {
                const cacheData = {
                    products: products,
                    timestamp: Date.now(),
                    version: '1.0'
                };
                localStorage.setItem('somel_products_cache', JSON.stringify(cacheData));
                
                if (idsWithTimestamps) {
                    localStorage.setItem('somel_timestamps', JSON.stringify(idsWithTimestamps));
                    localStorage.setItem('somel_cached_ids', JSON.stringify(Object.keys(idsWithTimestamps)));
                }
            } catch (e) {
                console.error('Save to cache error:', e);
            }
        }
        
        function loadFromCache() {
            try {
                const cached = localStorage.getItem('somel_products_cache');
                if (cached) {
                    const data = JSON.parse(cached);
                    if (data.timestamp && (Date.now() - data.timestamp) < 300000) {
                        return data.products;
                    }
                }
            } catch (e) {
                console.error('Load from cache error:', e);
            }
            return null;
        }
        
        function getCachedIds() {
            try {
                const cachedIds = localStorage.getItem('somel_cached_ids');
                if (cachedIds) {
                    return JSON.parse(cachedIds);
                }
            } catch (e) {}
            return [];
        }
        
        async function getPublicIds() {
            try {
                const url = 'https://tbs-server-s7vy.onrender.com/secmark/get_public/';
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                console.log('Server response:', data);
                
                if (data.status === 'success') {
                    if (data.ids && typeof data.ids === 'object') {
                        const idsObject = data.ids;
                        const idsCount = Object.keys(idsObject).length;
                        console.log(`Server returned ${idsCount} products`);
                        
                        if (idsCount === 0) {
                            console.log('Server returned empty ids, clearing cache...');
                            clearAllCache();
                            return {};
                        }
                        
                        return idsObject;
                    }
                    return {};
                }
                return null;
            } catch (error) {
                console.error('Error fetching public IDs:', error);
                return null;
            }
        }
        
        async function getProductById(productId) {
            try {
                const url = `https://tbs-server-s7vy.onrender.com/secmark/get_product/?id=${encodeURIComponent(productId)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Error fetching product:', error);
                return null;
            }
        }
        
        async function loadAllProducts() {
            if (isLoading) return;
            isLoading = true;
            
            const container = document.getElementById('mainlist');
            const statsDiv = document.getElementById('stats');
            
            try {
                const freshIdsWithTimestamps = await getPublicIds();
                
                if (!freshIdsWithTimestamps) {
                    if (statsDiv) statsDiv.innerHTML = '⚠️ Ошибка соединения';
                    return;
                }
                
                const freshIds = Object.keys(freshIdsWithTimestamps);
                
                if (freshIds.length === 0) {
                    console.log('No products on server, clearing display');
                    renderProducts({});
                    currentProducts = {};
                    clearAllCache();
                    return;
                }
                
                const cachedProducts = loadFromCache();
                const cachedIds = getCachedIds();
                
                if (cachedProducts && cachedIds.length > 0) {
                    renderProducts(cachedProducts);
                    currentProducts = cachedProducts;
                }
                
                const cachedTimestamps = JSON.parse(localStorage.getItem('somel_timestamps') || '{}');
                
                const productsToUpdate = {};
                const idsToDelete = [];
                
                for (const id of cachedIds) {
                    if (!freshIdsWithTimestamps[id]) {
                        idsToDelete.push(id);
                    }
                }
                
                for (const [id, freshTime] of Object.entries(freshIdsWithTimestamps)) {
                    const cachedTime = cachedTimestamps[id];
                    if (!cachedTime || freshTime > cachedTime) {
                        productsToUpdate[id] = freshTime;
                    }
                }
                
                const updateIds = Object.keys(productsToUpdate);
                
                if (updateIds.length > 0) {
                    console.log(`Updating ${updateIds.length} products...`);
                    if (statsDiv) statsDiv.innerHTML = `🔄 Обновление (${updateIds.length})...`;
                    
                    for (const id of updateIds) {
                        const product = await getProductById(id);
                        if (product && !product.error) {
                            currentProducts[id] = product;
                        }
                        await new Promise(resolve => setTimeout(resolve, 30));
                    }
                }
                
                if (idsToDelete.length > 0) {
                    console.log(`Deleting ${idsToDelete.length} products...`);
                    for (const id of idsToDelete) {
                        delete currentProducts[id];
                    }
                }
                
                renderProducts(currentProducts);
                saveToCache(currentProducts, freshIdsWithTimestamps);
                
                if (statsDiv) statsDiv.innerHTML = `📊 Всего товаров: ${Object.keys(currentProducts).length}`;
                
            } catch (error) {
                console.error('Load error:', error);
                const cachedProducts = loadFromCache();
                if (cachedProducts && Object.keys(cachedProducts).length > 0) {
                    renderProducts(cachedProducts);
                    if (statsDiv) statsDiv.innerHTML = `📊 Всего товаров: ${Object.keys(cachedProducts).length} (кеш)`;
                } else {
                    container.innerHTML = `
                        <div class="empty-state error">
                            <p>❌ Ошибка загрузки данных</p>
                            <button onclick="location.reload()" style="margin-top: 15px; padding: 8px 16px;">Повторить</button>
                        </div>
                    `;
                }
            } finally {
                isLoading = false;
            }
        }
        
        let updateInterval = null;
        
        function startBackgroundUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                if (!isLoading) {
                    loadAllProducts();
                }
            }, 30000);
        }
        
        function stopBackgroundUpdates() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
        }
        
        async function init() {
            await loadAllProducts();
            startBackgroundUpdates();
        }
        
        window.addEventListener('beforeunload', () => {
            stopBackgroundUpdates();
        });
        
        init();
    </script>
</body>
</html>
